stages:
  data_ingestion:                          # changed hyphen to underscore (consistency)
    cmd: python src/data/data_ingestion.py
    deps:
      - src/data/data_ingestion.py
      - data/raw/                          # raw dataset folder tracked by dvc add
    params:
      - data_ingestion.test_size
    outs:
      - data/interim/train.csv
      - data/interim/test.csv

  data_preprocessing:
    cmd: python src/data/data_preprocessing.py
    deps:
      - src/data/data_preprocessing.py
      - data/interim/train.csv             # FIX: was data/raw/ — outputs from stage 1 go to interim
      - data/interim/test.csv              # FIX: same
    outs:
      - data/interim/train_processed.csv   # FIX: specific files, not whole data/interim folder
      - data/interim/test_processed.csv

  model_building:
    cmd: python src/model/model_building.py
    deps:
      - src/model/model_building.py
      - data/interim/train_processed.csv
    params:
      - tfidf.max_features                 # FIX: matches updated params.yaml keys
      - tfidf.ngram_range
      - model.num_leaves
      - model.learning_rate
      - model.n_estimators
      - model.max_depth
    outs:
      - models/lgbm_model.pkl              # FIX: store in models/ folder, not project root
      - models/tfidf_vectorizer.pkl

  model_evaluation:
    cmd: python src/model/model_evaluation.py
    deps:
      - src/model/model_evaluation.py
      - models/lgbm_model.pkl              # FIX: updated path
      - models/tfidf_vectorizer.pkl        # FIX: updated path
      - data/interim/test_processed.csv    # FIX: removed train_processed — eval only needs test
    metrics:
      - metrics.json:                      # ADD: proper metrics tracking (DVC reads this)
          cache: false
    outs:
      - experiment_info.json

  model_registration:
    cmd: python src/model/register_model.py
    deps:
      - src/model/register_model.py
      - experiment_info.json